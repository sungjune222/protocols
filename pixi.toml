[workspace]
authors = ["sungjune222"]
channels = ["conda-forge", "bioconda"]
name = "protocols"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
cmake = ">=4.2.3,<5"
entrez-direct = ">=24.0,<25"
jupyterlab = ">=4.5.6,<5"
libopenblas = ">=0.3.31,<0.4"
pixi-kernel = ">=0.7.1,<0.8"
pkg-config = ">=0.29.2,<0.30"
python = "3.13.*"
rpy2 = ">=3.6.5,<4"
r-base = ">=4.5.3,<4.6"
r-cairo = ">=1.7_0,<2"
r-devtools = ">=2.4.6,<3"
r-ggrastr = ">=1.0.2,<2"
r-httpgd = ">=2.0.4,<3"
r-igraph = ">=2.1.4,<3"
r-irkernel = ">=1.3.2,<2"
r-languageserver = ">=0.3.17,<0.4"
r-matrix = ">=1.7_4,<2"
r-png = ">=0.1_8,<0.2"
r-spdep = ">=1.4_2,<2"
r-styler = ">=1.11.0,<2"
r-svglite = ">=2.2.2,<3"
sra-tools = ">=3.2.1,<4"
zlib = ">=1.3.1,<2"

[pypi-dependencies]
anndata2ri = ">=2.0, <3"
gseapy = ">=1.1.12, <2"
ipywidgets = ">=8.1.8, <9"
pingouin = ">=0.6.0, <0.7"
pydeseq2 = ">=0.5.4, <0.6"
pyranges = ">=0.1.4, <0.2"
python-dotenv = ">=1.2.2, <2"
pywgcna = ">=2.2.1, <3"
rapids-singlecell-cu13 = { version = ">=0.15.0rc4, <0.16", extras = ["rapids"] }
sccomposite = ">=1.0.0, <2"
scikit-misc = ">=0.5.2, <0.6"
scvi-tools = ">=1.4.2, <2"
statannotations = ">=0.7.2, <0.8"

[pypi-options]
extra-index-urls = ["https://pypi.nvidia.com"]

[activation]
env = { PYTHONPATH = "$PIXI_PROJECT_ROOT" }
